# Nombre de la aplicación
spring.application.name=Stockly

# Configuración de PostgreSQL (Supabase)
spring.datasource.url=jdbc:postgresql://aws-1-eu-west-1.pooler.supabase.com:5432/postgres
spring.datasource.username=postgres.mekcfkjbznceitsckjjr
spring.datasource.password=m6iScDtgHNyAOlbH
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Configuración del servidor
server.port=8081
server.error.include-message=always
server.error.include-binding-errors=always

# Configuración de logging
logging.level.com.stockly.Api=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Clave secreta JWT de Supabase (Project Settings > API > JWT Secret)
supabase.jwt.secret=${SUPABASE_JWT_SECRET:TU_JWT_SECRET_DE_SUPABASE}

# Firebase Admin SDK — ruta al archivo service-account.json
# Descárgalo en Firebase Console > Configuración del proyecto > Cuentas de servicio
# En producción usa variable de entorno: GOOGLE_APPLICATION_CREDENTIALS=/ruta/service-account.json
firebase.credentials.path=${GOOGLE_APPLICATION_CREDENTIALS:classpath:firebase-service-account.json}


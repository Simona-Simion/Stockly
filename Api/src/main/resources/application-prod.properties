# ─────────────────────────────────────────────────────────────
# Perfil PRODUCCIÓN — todas las credenciales vienen de variables
# de entorno configuradas en el panel de Render.
# ─────────────────────────────────────────────────────────────

# Base de datos (Supabase connection string)
# Formato: jdbc:postgresql://HOST:PORT/DATABASE
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# Puerto asignado dinámicamente por Render
server.port=${PORT:8080}

# JPA — sin SQL en logs en producción
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logging más silencioso en producción
logging.level.com.stockly.api=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# Orígenes permitidos en CORS (dominio de Firebase Hosting)
# Ejemplo: https://stockly-12345.web.app,https://stockly-12345.firebaseapp.com
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:https://TU_PROYECTO.web.app}

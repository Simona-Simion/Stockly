# ── Base de datos ──────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# ── Servidor ───────────────────────────────────────────────
server.port=${PORT:8081}

# ── JPA ────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ── JWT / Supabase ─────────────────────────────────────────
supabase.jwks.uri=https://qhvlexqrempqetnwrcxr.supabase.co/auth/v1/.well-known/jwks.json

# ── Firebase ───────────────────────────────────────────────
firebase.credentials.path=${GOOGLE_APPLICATION_CREDENTIALS:classpath:firebase-service-account.json}
# ── CORS ───────────────────────────────────────────────────
cors.allowed.origins=${CORS_ALLOWED_ORIGINS}

# ── Logging ────────────────────────────────────────────────
logging.level.com.stockly.api=INFO
logging.level.org.hibernate.SQL=WARN